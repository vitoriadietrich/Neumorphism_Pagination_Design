<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paginação Neumórfica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="pagination-container">
        <button class="btn-nav neu-raised" id="prevBtn">Previous</button>
        
        <ul class="page-list">
            <li class="page-item neu-raised" data-page="1">1</li>
            <li class="page-item neu-raised" data-page="2">2</li>
            <li class="page-item neu-raised" data-page="3">3</li>
            <li class="page-item neu-raised" data-page="4">4</li>
            <li class="page-item neu-raised" data-page="5">5</li>
            <li class="page-item neu-raised" data-page="6">6</li>
            <li class="page-item neu-raised" data-page="7">7</li>
            <li class="page-item neu-pressed active" data-page="8">8</li>
        </ul>

        <button class="btn-nav neu-raised" id="nextBtn">Next</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
